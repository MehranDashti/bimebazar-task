services:
  db:
    image: mysql:8.0
    container_name: inventory-app-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: inventorydb
      MYSQL_USER: inventoryuser
      MYSQL_PASSWORD: inventorypassword
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uinventoryuser", "-pinventorypassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inventory-app-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./
      dockerfile: docker/Dockerfile
    container_name: inventory-app
    restart: unless-stopped
    env_file: .env
    environment:
      # Overrides DATABASE_URL and REDIS_URL from .env so hostnames resolve to service names
      DATABASE_URL: mysql+aiomysql://inventoryuser:inventorypassword@db:3306/inventorydb
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Uncomment for live-reload during development:
    # volumes:
    #   - ./app:/app/app

volumes:
  db_data:
  redis_data:
